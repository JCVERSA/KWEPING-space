name: RDP-Robust-Final

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-2025
    timeout-minutes: 350
    
    steps:
      - name: "Initialisation"
        uses: actions/checkout@v4

      - name: "Installation Rclone"
        run: choco install rclone -y

      - name: "Configuration Rclone"
        shell: pwsh
        env:
          RCLONE_SECRET: ${{ secrets.RCLONE_CONFIG }}
        run: |
          $ConfigPath = "$env:USERPROFILE\.config\rclone"
          New-Item -ItemType Directory -Force -Path $ConfigPath
          Set-Content -Path "$ConfigPath\rclone.conf" -Value $env:RCLONE_SECRET

      - name: "Restauration (Download Drive -> VM)"
        shell: pwsh
        run: rclone sync drive:RDP_Backup D:\RDP_Data --config "$env:USERPROFILE\.config\rclone\rclone.conf" --progress

      - name: "Setup Windows & Apps (Auto-Correction)"
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          # Ajoute ici tes autres installations d'applications...

      - name: "Interface de contrôle et Maintien"
        shell: powershell
        run: |
          # Création bouton "Sauvegarder et Quitter" sur le bureau
          $script = @"
          @echo off
          echo "Sauvegarde en cours... Ne fermez pas la fenetre !"
          echo stop > D:\RDP_Data\stop.txt
          "@
          Set-Content "C:\Users\Public\Desktop\Sauvegarder_et_Quitter.bat" $script

          # Boucle de surveillance active
          $totalSeconds = 20400 # 340 minutes
          for ($i=1; $i -le $totalSeconds; $i+=10) {
              Start-Sleep -Seconds 10
              
              if ($i -eq 18600) { msg * "Attention: Le RDP se ferme dans 30 minutes !" }
              if ($i -eq 19800) { msg * "Attention: Le RDP se ferme dans 10 minutes ! Cliquez sur 'Sauvegarder et Quitter'." }

              if (Test-Path "D:\RDP_Data\stop.txt") {
                  Write-Host "Signal reçu : Sauvegarde..."
                  rclone sync D:\RDP_Data drive:RDP_Backup --config "$env:USERPROFILE\.config\rclone\rclone.conf" --progress
                  exit 0
              }
          }
          # Backup final automatique si le temps expire
          rclone sync D:\RDP_Data drive:RDP_Backup --config "$env:USERPROFILE\.config\rclone\rclone.conf" --progress
