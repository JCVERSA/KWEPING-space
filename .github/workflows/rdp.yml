name: RDP-Robust-Cache-Final

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-2025
    timeout-minutes: 350 # Arrêt automatique de sécurité générale à 5h50
    
    steps:
      - name: "Initialisation du dépôt"
        uses: actions/checkout@v4

      # Création des dossiers sur D: avant la restauration du cache
      - name: "Préparation de l'espace disque D:"
        shell: powershell
        run: |
          if (!(Test-Path "D:\RDP_Data\FirefoxProfile")) { New-Item -ItemType Directory -Force -Path "D:\RDP_Data\FirefoxProfile" }
          if (!(Test-Path "D:\RDP_Data\Projects")) { New-Item -ItemType Directory -Force -Path "D:\RDP_Data\Projects" }

      - name: "Restaurer le profil Firefox"
        uses: actions/cache@v4
        with:
          path: D:\RDP_Data\FirefoxProfile
          key: firefox-profile-${{ github.run_id }}
          restore-keys: |
            firefox-profile-

      - name: "Restaurer les Projets de Code"
        uses: actions/cache@v4
        with:
          path: D:\RDP_Data\Projects
          key: rdp-projects-${{ github.run_id }}
          restore-keys: |
            rdp-projects-

      - name: "Installation et Configuration des Applications"
        shell: powershell
        run: |
          # Configuration RDP et activation des accès
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Configuration du compte utilisateur personnalisé "Neon" avec ton secret de passe
          Rename-LocalUser -Name "runneradmin" -NewName "Neon"
          $Password = ConvertTo-SecureString "${{ secrets.RDP_PASS }}" -AsPlainText -Force
          Set-LocalUser -Name "Neon" -Password $Password
          
          # Installation des outils requis avec gestion des échecs (Retry)
          $apps = @("Microsoft.VisualStudioCode", "Mozilla.Firefox", "Oracle.JDK.21")
          foreach ($app in $apps) {
              $retry = 0
              $success = $false
              while (($retry -lt 3) -and ($success -eq $false)) {
                  try {
                      Write-Host "Installation de $app (Tentative $($retry + 1)/3)..."
                      winget install --id $app --silent --accept-source-agreements --accept-package-agreements -e
                      $success = $true
                  } catch {
                      $retry++
                      Write-Host "Échec de l'installation de $app. Nouvelle tentative dans 10 secondes..."
                      Start-Sleep -Seconds 10
                  }
              }
          }

      - name: "Configuration de l'environnement persistant"
        shell: powershell
        run: |
          # Configuration du raccourci Firefox pour charger le profil sur le disque D:
          $shortcutPath = "C:\Users\Public\Desktop\Firefox.lnk"
          $targetPath = "C:\Program Files\Mozilla Firefox\firefox.exe"
          
          if ((Get-ChildItem "D:\RDP_Data\FirefoxProfile").Count -eq 0) {
              $arguments = ""
          } else {
              $arguments = "--profile `"D:\RDP_Data\FirefoxProfile`""
          }
          
          $WScriptShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WScriptShell.CreateShortcut($shortcutPath)
          $Shortcut.TargetPath = $targetPath
          $Shortcut.Arguments = $arguments
          $Shortcut.Save()

      - name: "Connexion sécurisée Tailscale et Informations RDP"
        shell: powershell
        run: |
          # Installation de Tailscale
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile "$env:TEMP\ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i `"$env:TEMP\ts.msi`" /quiet" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}
          
          # Récupération de l'adresse IP Tailscale assignée
          $tsIP = (& "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4).Trim()

          # Menu affichant les informations essentielles de connexion
          Write-Host "=========================================================="
          Write-Host "            INFORMATIONS DE CONNEXION RDP                 "
          Write-Host "=========================================================="
          Write-Host "Adresse IP RDP (Tailscale) : $tsIP"
          Write-Host "Nom d'utilisateur          : Neon"
          Write-Host "Mot de passe               : [Utilise ton secret RDP_PASS]"
          Write-Host "=========================================================="

      - name: "Boucle de maintien de session"
        shell: powershell
        run: |
          if (Test-Path "D:\RDP_Data\stop.txt") { Remove-Item "D:\RDP_Data\stop.txt" -Force }

          # Création de l'icône d'arrêt sur le bureau
          $buttonScript = @"
          @echo off
          title Sauvegarde et Fermeture RDP
          echo ===================================================
          echo Fermeture propre des outils et envoi du signal...
          echo ===================================================
          echo stop > D:\RDP_Data\stop.txt
          "@
          Set-Content "C:\Users\Public\Desktop\Sauvegarder_et_Quitter.bat" $buttonScript

          # Surveillance simple (Durée maximale : 340 minutes)
          $totalSeconds = 20400
          for ($i = 0; $i -lt $totalSeconds; $i += 10) {
              Start-Sleep -Seconds 10

              if (Test-Path "D:\RDP_Data\stop.txt") {
                  Write-Host "Signal d'arrêt intercepté. Fermeture en cours..."
                  break
              }
          }

      - name: "Fermeture sécurisée et libération des fichiers"
        if: always()
        shell: powershell
        run: |
          Write-Host "Arrêt forcé des applications pour libérer le cache..."
          Stop-Process -Name "firefox" -Force -ErrorAction SilentlyContinue
          Stop-Process -Name "Code" -Force -ErrorAction SilentlyContinue
          Stop-Process -Name "java" -Force -ErrorAction SilentlyContinue
          Stop-Process -Name "adb" -Force -ErrorAction SilentlyContinue
          
          # Pause de sécurité pour laisser le disque souffler avant la compression du cache
          Start-Sleep -Seconds 5
          Write-Host "Fichiers libérés. Lancement de la sauvegarde automatique."
